{% extends "base.html" %}
{% set body_class = "offset-navbar" %}

{% block content %}

<div class="max-w-md mx-auto pt-28 px-4">
  <div class="bg-white rounded-2xl shadow-sm border p-6">

    <div class="mb-5">
      <h1 class="text-2xl font-bold text-gray-800">
        Sblocco amministratore
      </h1>
      <p class="text-sm text-gray-500 mt-2">
        Per continuare nell’area admin conferma la tua identità.
      </p>
    </div>

    <!-- 🔐 SBLOCCO CON PASSKEY -->
    <div class="mb-5">
      <button
        type="button"
        id="admin-passkey-unlock-btn"
        class="w-full rounded-xl bg-gray-900 hover:bg-black text-white font-semibold py-3 flex items-center justify-center gap-2"
      >
        <span>🔐</span>
        <span>Sblocca con passkey</span>
      </button>

      <p id="admin-passkey-unlock-msg" class="text-sm mt-3 hidden"></p>
    </div>

    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-200"></div>
      </div>
      <div class="relative flex justify-center text-xs">
        <span class="bg-white px-3 text-gray-400">oppure</span>
      </div>
    </div>

    <!-- 🔑 FALLBACK PASSWORD -->
    <form method="POST" action="{{ url_for('admin_unlock', next=next_url) }}" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Password account
        </label>
        <input
          type="password"
          name="password"
          required
          autocomplete="current-password"
          class="w-full rounded-xl border-gray-300 focus:border-blue-500 focus:ring-blue-500"
          placeholder="Inserisci la password"
        >
      </div>

      <button
        type="submit"
        class="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3"
      >
        Sblocca con password
      </button>
    </form>

    <p class="text-xs text-gray-400 mt-4">
      Lo sblocco resta valido solo temporaneamente su questo dispositivo.
    </p>

  </div>
</div>

<script>
(function () {
  const btn = document.getElementById("admin-passkey-unlock-btn");
  const msg = document.getElementById("admin-passkey-unlock-msg");
  const csrfToken = "{{ csrf_token() }}";
  const nextUrl = "{{ next_url }}";

  if (!btn || !msg) return;

  function showMsg(text, type) {
    msg.classList.remove("hidden", "text-red-600", "text-green-600", "text-gray-500");

    if (type === "success") {
      msg.classList.add("text-green-600");
    } else if (type === "error") {
      msg.classList.add("text-red-600");
    } else {
      msg.classList.add("text-gray-500");
    }

    msg.textContent = text;
  }

  function base64urlToBuffer(base64url) {
    const padding = "=".repeat((4 - base64url.length % 4) % 4);
    const base64 = (base64url + padding).replace(/-/g, "+").replace(/_/g, "/");
    const raw = window.atob(base64);
    const buffer = new ArrayBuffer(raw.length);
    const view = new Uint8Array(buffer);

    for (let i = 0; i < raw.length; i++) {
      view[i] = raw.charCodeAt(i);
    }

    return buffer;
  }

  function bufferToBase64url(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = "";

    for (let i = 0; i < bytes.byteLength; i++) {
      binary += String.fromCharCode(bytes[i]);
    }

    return window.btoa(binary)
      .replace(/\+/g, "-")
      .replace(/\//g, "_")
      .replace(/=+$/g, "");
  }

  function preparePublicKeyOptions(options) {
    options.challenge = base64urlToBuffer(options.challenge);

    if (Array.isArray(options.allowCredentials)) {
      options.allowCredentials = options.allowCredentials.map((cred) => {
        return {
          ...cred,
          id: base64urlToBuffer(cred.id)
        };
      });
    }

    return options;
  }

  function serializeAssertion(assertion) {
    return {
      id: assertion.id,
      rawId: bufferToBase64url(assertion.rawId),
      type: assertion.type,
      response: {
        authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
        clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
        signature: bufferToBase64url(assertion.response.signature),
        userHandle: assertion.response.userHandle
          ? bufferToBase64url(assertion.response.userHandle)
          : null
      }
    };
  }

  btn.addEventListener("click", async function () {
    if (!window.PublicKeyCredential || !navigator.credentials) {
      showMsg("Questo browser non supporta le passkey.", "error");
      return;
    }

    btn.disabled = true;
    btn.classList.add("opacity-60", "cursor-not-allowed");
    showMsg("Richiesta passkey in corso…", "info");

    try {
      const optionsResponse = await fetch("{{ url_for('admin_passkey_auth_options') }}", {
        method: "POST",
        headers: {
          "X-CSRF-Token": csrfToken
        },
        credentials: "same-origin"
      });

      const optionsData = await optionsResponse.json();

      if (!optionsResponse.ok || optionsData.ok === false) {
        throw new Error(optionsData.error || "Impossibile avviare la passkey.");
      }

      const publicKey = preparePublicKeyOptions(optionsData);

      const assertion = await navigator.credentials.get({
        publicKey: publicKey
      });

      const serialized = serializeAssertion(assertion);

      const verifyResponse = await fetch("{{ url_for('admin_passkey_auth_verify') }}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRF-Token": csrfToken
        },
        credentials: "same-origin",
        body: JSON.stringify(serialized)
      });

      const verifyData = await verifyResponse.json();

      if (!verifyResponse.ok || verifyData.ok !== true) {
        throw new Error(verifyData.error || "Passkey non valida.");
      }

      showMsg("Identità confermata. Accesso in corso…", "success");

      window.location.href = nextUrl || "{{ url_for('admin_dashboard') }}";

    } catch (err) {
      console.error("Errore sblocco passkey admin:", err);
      showMsg(err.message || "Sblocco con passkey non riuscito.", "error");

      btn.disabled = false;
      btn.classList.remove("opacity-60", "cursor-not-allowed");
    }
  });
})();
</script>

{% endblock %}
