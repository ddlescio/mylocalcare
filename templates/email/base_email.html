<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
</head>

<body style="margin:0; padding:0; background:#f3f4f6; font-family:Arial, Helvetica, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#f3f4f6; padding:40px 0;">
<tr>
<td align="center">

<table width="600" cellpadding="0" cellspacing="0"
       style="background:white; border-radius:10px; overflow:hidden; box-shadow:0 6px 18px rgba(0,0,0,0.08);">

<!-- HEADER -->
<tr>
<td style="background:#2563eb; padding:24px 25px; text-align:center;">
  <div style="color:#ffffff; font-size:24px; line-height:1.2; font-weight:700; letter-spacing:-0.02em;">
    MyLocalCare
  </div>
  <div style="color:#dbeafe; font-size:13px; line-height:1.4; margin-top:6px;">
    La piattaforma dei servizi locali di fiducia
  </div>
</td>
</tr>

<!-- CONTENT -->
<tr>
<td style="padding:40px 35px; text-align:center;">
{% block content %}{% endblock %}
</td>
</tr>

<!-- FOOTER -->
<tr>
<td style="background:#f9fafb; padding:20px; text-align:center; font-size:12px; color:#64748b; line-height:1.6;">
  <strong style="color:#334155;">MyLocalCare</strong><br>
  MyLocalCare - Davide Lescio<br>
  Via Pasubio, Abbiategrasso (MI), Italia<br>
  <a href="https://www.mylocalcare.it/privacy"
     style="color:#2563eb; text-decoration:underline;">
    Informativa privacy
  </a>
</td>
</tr>

</table>

</td>
</tr>
</table>

</body>
</html>
