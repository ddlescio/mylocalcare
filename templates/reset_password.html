{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white/90 backdrop-blur-sm border border-gray-100 rounded-3xl shadow-lg p-6 mt-10">
  <h1 class="text-2xl font-semibold text-blue-700 mb-4 text-center">
    Imposta una nuova password
  </h1>
  <p class="text-sm text-gray-600 mb-6 text-center">
    Scegli una nuova password per il tuo account LocalCare.
  </p>

  <form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
        Nuova password
      </label>

      <div class="relative">
        <input type="password"
               name="password"
               id="password"
               required
               minlength="8"
               pattern="(?=.*[A-Za-z])(?=.*\d).{8,}"
               title="La password deve avere almeno 8 caratteri, almeno una lettera e almeno un numero."
               class="w-full border border-gray-200 rounded-xl px-3 py-2 pr-11 text-sm
                      focus:ring-2 focus:ring-blue-200 focus:border-blue-400 outline-none">

        <button type="button"
                class="toggle-password absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 hover:text-gray-700"
                data-target="password"
                aria-label="Mostra password">
          👁️
        </button>
      </div>

      <p class="text-xs text-gray-500 mt-1">
        Minimo 8 caratteri, almeno una lettera e un numero.
      </p>
    </div>

    <div>
      <label for="conferma_password" class="block text-sm font-medium text-gray-700 mb-1">
        Conferma password
      </label>

      <div class="relative">
        <input type="password"
               name="conferma_password"
               id="conferma_password"
               required
               minlength="8"
               class="w-full border border-gray-200 rounded-xl px-3 py-2 pr-11 text-sm
                      focus:ring-2 focus:ring-blue-200 focus:border-blue-400 outline-none">

        <button type="button"
                class="toggle-password absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 hover:text-gray-700"
                data-target="conferma_password"
                aria-label="Mostra password">
          👁️
        </button>
      </div>
    </div>

    <button type="submit"
            class="w-full inline-flex justify-center items-center gap-2 px-4 py-2
                   bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold
                   rounded-xl shadow-sm hover:shadow-md transition">
      Salva nuova password
    </button>
  </form>

  <div class="text-center mt-4">
    <a href="{{ url_for('login') }}" class="text-sm text-blue-600 hover:underline">
      Torna al login
    </a>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const form = document.querySelector("form");
  const password = document.getElementById("password");
  const confermaPassword = document.getElementById("conferma_password");

  if (form && password && confermaPassword) {
    form.addEventListener("submit", (e) => {
      if (password.value !== confermaPassword.value) {
        e.preventDefault();
        alert("Le password non coincidono.");
        confermaPassword.focus();
      }
    });
  }

  document.querySelectorAll(".toggle-password").forEach((btn) => {
    btn.addEventListener("click", () => {
      const targetId = btn.dataset.target;
      const input = document.getElementById(targetId);

      if (!input) return;

      const isHidden = input.type === "password";

      input.type = isHidden ? "text" : "password";
      btn.textContent = isHidden ? "🙈" : "👁️";
      btn.setAttribute(
        "aria-label",
        isHidden ? "Nascondi password" : "Mostra password"
      );
    });
  });
});
</script>
{% endblock %}
