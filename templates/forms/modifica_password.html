{% extends "base.html" %}
{% set page = "impostazioni" %}
{% block content %}

<div class="max-w-md mx-auto px-4 pt-24 pb-10">

  <!-- 🔙 TORNA -->
  <a href="{{ url_for('impostazioni') }}" class="flex items-center text-blue-600 mb-4">
    <span class="text-xl mr-1">←</span>
    Torna
  </a>

  <h1 class="text-2xl font-bold text-gray-800 mb-6">🔐 Modifica Password</h1>

  <form method="POST" class="bg-white p-6 rounded-2xl shadow-sm border space-y-5">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="block text-gray-600 mb-1">Password attuale</label>

      <div class="relative">
        <input type="password"
               name="password_attuale"
               id="password_attuale"
               required
               autocomplete="current-password"
               class="w-full border rounded-xl px-4 py-2 pr-14">

        <button type="button"
                data-toggle-password="password_attuale"
                aria-label="Mostra password"
                class="password-eye absolute right-3 top-1/2 -translate-y-1/2 z-20 text-sm text-gray-500 hover:text-gray-700 font-semibold bg-white/80 px-1">
          👁
        </button>
      </div>
    </div>

    <div>
      <label class="block text-gray-600 mb-1">Nuova password</label>

      <div class="relative">
        <input type="password"
               name="nuova_password"
               id="nuova_password"
               required
               minlength="8"
               pattern="(?=.*[A-Za-z])(?=.*\d).{8,}"
               title="La password deve avere almeno 8 caratteri, almeno una lettera e almeno un numero."
               autocomplete="new-password"
               class="w-full border rounded-xl px-4 py-2 pr-14">

        <button type="button"
                data-toggle-password="nuova_password"
                aria-label="Mostra password"
                class="password-eye absolute right-3 top-1/2 -translate-y-1/2 z-20 text-sm text-gray-500 hover:text-gray-700 font-semibold bg-white/80 px-1">
          👁
        </button>
      </div>

      <p class="text-xs text-gray-500 mt-1">
        Minimo 8 caratteri, almeno una lettera e un numero.
      </p>

    </div>

    <div>
      <label class="block text-gray-600 mb-1">Conferma nuova password</label>

      <div class="relative">
        <input type="password"
               name="conferma_password"
               id="conferma_password"
               required
               minlength="8"
               autocomplete="new-password"
               class="w-full border rounded-xl px-4 py-2 pr-14">

        <button type="button"
                data-toggle-password="conferma_password"
                aria-label="Mostra password"
                class="password-eye absolute right-3 top-1/2 -translate-y-1/2 z-20 text-sm text-gray-500 hover:text-gray-700 font-semibold bg-white/80 px-1">
          👁
        </button>
      </div>
    </div>

    <button class="w-full bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700 transition">
      Aggiorna password
    </button>
  </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const form = document.querySelector("form");
  const nuovaPassword = document.getElementById("nuova_password");
  const confermaPassword = document.getElementById("conferma_password");

  if (form && nuovaPassword && confermaPassword) {
    form.addEventListener("submit", (e) => {
      if (nuovaPassword.value !== confermaPassword.value) {
        e.preventDefault();
        alert("Le password non coincidono.");
        confermaPassword.focus();
      }
    });
  }

  document.querySelectorAll("[data-toggle-password]").forEach((button) => {
    button.addEventListener("click", () => {
      const inputId = button.getAttribute("data-toggle-password");
      const input = document.getElementById(inputId);

      if (!input) return;

      if (input.type === "password") {
        input.type = "text";
        button.textContent = "🙈";
        button.setAttribute("aria-label", "Nascondi password");
      } else {
        input.type = "password";
        button.textContent = "👁";
        button.setAttribute("aria-label", "Mostra password");
      }
    });
  });
});
</script>
{% endblock %}
