{% extends "base.html" %}
{% set page = "impostazioni" %}
{% block content %}

<div class="max-w-md mx-auto px-4 pt-24 pb-10">

  <!-- 🔙 TORNA -->
  <a href="{{ url_for('impostazioni') }}" class="flex items-center text-blue-600 mb-4">
    <span class="text-xl mr-1">←</span>
    Torna
  </a>

  <h1 class="text-2xl font-bold text-gray-800 mb-6">🔐 Modifica Password</h1>

  <form method="POST" class="bg-white p-6 rounded-2xl shadow-sm border space-y-5">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="block text-gray-600 mb-1">Password attuale</label>

      <div class="relative">
        <input type="password"
               name="password_attuale"
               id="password_attuale"
               required
               class="w-full border rounded-xl px-4 py-2 pr-12">

        <button type="button"
                onclick="togglePasswordVisibility('password_attuale', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-gray-500 hover:text-gray-700 font-semibold">
          👁
        </button>
      </div>
    </div>

    <div>
      <label class="block text-gray-600 mb-1">Nuova password</label>

      <div class="relative">
        <input type="password"
               name="nuova_password"
               id="nuova_password"
               required
               class="w-full border rounded-xl px-4 py-2 pr-12">

        <button type="button"
                onclick="togglePasswordVisibility('nuova_password', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-gray-500 hover:text-gray-700 font-semibold">
          👁
        </button>
      </div>
    </div>

    <div>
      <label class="block text-gray-600 mb-1">Conferma nuova password</label>

      <div class="relative">
        <input type="password"
               name="conferma_password"
               id="conferma_password"
               required
               class="w-full border rounded-xl px-4 py-2 pr-12">

        <button type="button"
                onclick="togglePasswordVisibility('conferma_password', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-gray-500 hover:text-gray-700 font-semibold">
          👁
        </button>
      </div>
    </div>

    <button class="w-full bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700 transition">
      Aggiorna password
    </button>
  </form>
</div>

<script>
function togglePasswordVisibility(inputId, button) {
  const input = document.getElementById(inputId);

  if (!input) return;

  if (input.type === "password") {
    input.type = "text";
    button.textContent = "🙈";
    button.setAttribute("aria-label", "Nascondi password");
  } else {
    input.type = "password";
    button.textContent = "👁";
    button.setAttribute("aria-label", "Mostra password");
  }
}
</script>

{% endblock %}
